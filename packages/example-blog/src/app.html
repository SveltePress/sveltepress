<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- sp-blog-theme-init --><script>(function(){var s=localStorage.getItem('sp-blog-theme');var p=window.matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light';var m="system";document.documentElement.dataset.theme=s||(m==='system'?p:m);})()</script>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" href="%sveltekit.assets%/favicon.svg" type="image/svg+xml" />
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
